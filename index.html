<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONYX SCANNER PRO</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --onyx: #00FF00; --bg: #0b0b0b; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }

        /* DESIGN ÉPURÉ DU DÉBUT */
        header { padding: 20px; font-weight: bold; font-size: 20px; color: var(--onyx); letter-spacing: 2px; }
        
        #scanner-box { 
            position: relative; width: 88%; height: 280px; 
            margin: 10px auto; border: 2px solid var(--onyx); 
            border-radius: 15px; overflow: hidden; background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* LIGNE DE SCAN FINE */
        .laser { 
            position: absolute; top: 0; left: 0; width: 100%; height: 2px; 
            background: var(--onyx); box-shadow: 0 0 12px var(--onyx);
            animation: scan 2s infinite linear;
        }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        /* ZONE DE RÉSULTAT NOIRE ET VERTE */
        .result-container { 
            margin: 20px auto; width: 85%; background: #111; 
            padding: 15px; border-radius: 12px; border-left: 4px solid var(--onyx);
            text-align: left;
        }
        .label { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .product-name { font-size: 18px; font-weight: bold; color: #fff; }

        .btn-flash { 
            background: none; border: 1px solid var(--onyx); color: var(--onyx); 
            padding: 10px 30px; border-radius: 8px; font-size: 14px; margin-top: 15px;
        }
    </style>
</head>
<body>

    <header>ONYX <span style="color:#fff">MESSIE</span></header>

    <div id="scanner-box">
        <video id="video" autoplay playsinline muted></video>
        <div class="laser"></div>
    </div>

    <div class="result-container">
        <div class="label">Statut : Analyse en cours</div>
        <div id="display-name" class="product-name">Prêt à scanner</div>
    </div>

    <button class="btn-flash" onclick="toggleFlash()">🔦 FLASH</button>

    <script>
        let track = null;
        const codeReader = new ZXing.BrowserBarcodeReader();

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                const video = document.getElementById('video');
                video.srcObject = stream;
                track = stream.getVideoTracks()[0];

                codeReader.decodeFromVideoDevice(null, 'video', (result) => {
                    if (result) {
                        if(navigator.vibrate) navigator.vibrate(50);
                        searchProduct(result.text);
                    }
                });
            } catch (err) { alert("Active la caméra dans les réglages."); }
        }

        async function searchProduct(code) {
            document.getElementById('display-name').innerText = "Recherche...";
            try {
                const response = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
                const data = await response.json();
                document.getElementById('display-name').innerText = (data.status === 1) ? data.product.product_name : "Inconnu (" + code + ")";
            } catch (e) {
                document.getElementById('display-name').innerText = "Code détecté : " + code;
            }
        }

        function toggleFlash() {
            if(track) {
                const isOn = track.getSettings().torch;
                track.applyConstraints({ advanced: [{ torch: !isOn }] });
            }
        }

        window.onload = init;
    </script>
</body>
</html>
