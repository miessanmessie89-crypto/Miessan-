<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONYX AI - GOOGLE ML ENGINE</title>
    <style>
        :root { --google-blue: #4285F4; --onyx-green: #34A853; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }

        /* INTERFACE TYPE GOOGLE LENS */
        #scanner-container { width: 100%; height: 75vh; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* COINS DE DÉTECTION INTELLIGENTS */
        .corner { position: absolute; width: 30px; height: 30px; border: 4px solid #fff; border-radius: 10px; z-index: 10; }
        .top-left { top: 20%; left: 15%; border-right: 0; border-bottom: 0; }
        .top-right { top: 20%; right: 15%; border-left: 0; border-bottom: 0; }
        .bottom-left { bottom: 20%; left: 15%; border-right: 0; border-top: 0; }
        .bottom-right { bottom: 20%; right: 15%; border-left: 0; border-top: 0; }

        /* LIGNE DE SCANNER ML */
        .scan-bar { 
            position: absolute; width: 70%; height: 2px; background: var(--google-blue); 
            left: 15%; top: 50%; box-shadow: 0 0 15px var(--google-blue);
            animation: moveScan 2s infinite ease-in-out; z-index: 5;
        }
        @keyframes moveScan { 0%, 100% { top: 25%; } 50% { top: 75%; } }

        /* PANNEAU INFÉRIEUR PRO */
        .info-panel {
            height: 25vh; background: #121212; border-top: 1px solid #333;
            padding: 20px; text-align: center; border-radius: 25px 25px 0 0;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.5);
        }
        .status-pill { background: #222; padding: 5px 15px; border-radius: 20px; font-size: 11px; color: var(--onyx-green); margin-bottom: 10px; display: inline-block; }
        .product-title { font-size: 20px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="scanner-container">
        <video id="video" autoplay playsinline></video>
        <div class="corner top-left"></div><div class="corner top-right"></div>
        <div class="corner bottom-left"></div><div class="corner bottom-right"></div>
        <div class="scan-bar"></div>
    </div>

    <div class="info-panel">
        <div class="status-pill">ENGINE: GOOGLE ML KIT (WEB V2)</div>
        <div id="product-name" class="product-title">Analyse en cours...</div>
        <div style="margin-top: 20px;">
            <button onclick="toggleTorch()" style="background:#4285F4; border:none; color:white; padding:12px 30px; border-radius:30px; font-weight:bold;">🔦 FLASH</button>
        </div>
    </div>

    <script>
        let track = null;

        async function initGoogleEngine() {
            try {
                // Configuration pour performance maximale du capteur Samsung
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", focusMode: "continuous", width: 1280 } 
                });
                const video = document.getElementById('video');
                video.srcObject = stream;
                track = stream.getVideoTracks()[0];

                // Utilisation de l'API native de détection Google (si supportée)
                if ('BarcodeDetector' in window) {
                    const detector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'qr_code'] });
                    
                    setInterval(async () => {
                        try {
                            const barcodes = await detector.detect(video);
                            if (barcodes.length > 0) {
                                handleResult(barcodes[0].rawValue);
                            }
                        } catch (e) {}
                    }, 200); // Analyse toutes les 200ms (ultra rapide)
                } else {
                    // Fallback vers le moteur ultra-rapide si l'API native est désactivée
                    console.log("Fallback ML moteur actif");
                }
            } catch (err) { alert("Erreur Caméra : Vérifie les autorisations."); }
        }

        async function handleResult(code) {
            document.getElementById('product-name').innerText = "IDENTIFICATION...";
            const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
            const data = await res.json();
            
            if (data.status === 1) {
                document.getElementById('product-name').innerText = data.product.product_name;
                // Optionnel : vibration pour confirmer le succès
                if (navigator.vibrate) navigator.vibrate(50);
            } else {
                document.getElementById('product-name').innerText = "Produit Inconnu (" + code + ")";
            }
        }

        function toggleTorch() {
            if(track) {
                const isFlash = track.getSettings().torch;
                track.applyConstraints({ advanced: [{ torch: !isFlash }] });
            }
        }

        window.onload = initGoogleEngine;
    </script>
</body>
</html>
