<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX SCAN ULTRA-POWER</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --onyx: #00FF00; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        
        /* ZONE DE SCAN AMÉLIORÉE */
        #scanner-wrapper { 
            position: relative; width: 95%; height: 300px; 
            margin: 15px auto; border: 3px solid var(--onyx); 
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* VISEUR LASER */
        .laser { 
            position: absolute; top: 50%; left: 0; width: 100%; height: 2px; 
            background: red; box-shadow: 0 0 15px red;
            animation: move 1.5s infinite;
        }
        @keyframes move { 0%, 100% { top: 20%; } 50% { top: 80%; } }

        .btn { 
            background: #111; border: 2px solid var(--onyx); color: var(--onyx); 
            padding: 12px; border-radius: 10px; font-weight: bold; margin: 5px;
            cursor: pointer; width: 45%;
        }
        #result-box { padding: 20px; border-top: 2px solid var(--onyx); background: #111; min-height: 100px; }
    </style>
</head>
<body>

    <h2 style="color:var(--onyx); margin-top:10px;">ONYX ULTRA SCANNER</h2>

    <div id="scanner-wrapper">
        <video id="video"></video>
        <div class="laser"></div>
    </div>

    <div style="display:flex; justify-content:center;">
        <button class="btn" onclick="toggleFlash()">🔦 LAMPE</button>
        <button class="btn" onclick="applyZoom()">🔍 ZOOM MAX</button>
    </div>

    <div id="result-box">
        <div id="status" style="font-size:12px; color:#888;">CAPTEUR PRÊT...</div>
        <div id="name" style="font-size:22px; font-weight:bold; margin-top:10px;">Scannez l'article</div>
    </div>

    <audio id="beep" src="https://www.soundjay.com/buttons/beep-07.mp3"></audio>

    <script>
        const codeReader = new ZXing.BrowserBarcodeReader();
        let videoTrack = null;
        let zoomLevel = 1;

        async function startUltraScan() {
            try {
                // FORCE LA HAUTE RÉSOLUTION ET LA CAMÉRA ARRIÈRE
                const constraints = {
                    video: {
                        facingMode: { exact: "environment" },
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        focusMode: "continuous"
                    }
                };

                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                const videoElement = document.getElementById('video');
                videoElement.srcObject = stream;
                videoTrack = stream.getVideoTracks()[0];

                // LANCE LA DÉTECTION RAPIDE
                codeReader.decodeFromVideoDevice(null, 'video', (result) => {
                    if (result) {
                        document.getElementById('beep').play();
                        handleResult(result.text);
                    }
                });
            } catch (err) {
                console.error(err);
                // Si la caméra "exact environment" échoue, on prend la caméra normale
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').srcObject = stream;
            }
        }

        async function handleResult(code) {
            document.getElementById('status').innerText = "CODE DÉTECTÉ : " + code;
            const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
            const data = await res.json();
            document.getElementById('name').innerText = (data.status === 1) ? data.product.product_name : "Inconnu ("+code+")";
        }

        function applyZoom() {
            if (videoTrack && videoTrack.getCapabilities().zoom) {
                zoomLevel = zoomLevel === 1 ? 2.5 : 1; // Bascule entre zoom x1 et x2.5
                videoTrack.applyConstraints({ advanced: [{ zoom: zoomLevel }] });
                document.getElementById('status').innerText = "ZOOM : x" + zoomLevel;
            } else {
                alert("Ton téléphone ne permet pas le zoom auto via le navigateur.");
            }
        }

        function toggleFlash() {
            if (videoTrack && videoTrack.getCapabilities().torch) {
                const isTorch = videoTrack.getSettings().torch;
                videoTrack.applyConstraints({ advanced: [{ torch: !isTorch }] });
            }
        }

        window.onload = startUltraScan;
    </script>
</body>
</html>
