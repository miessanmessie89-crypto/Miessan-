<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX SCAN ULTIMATE</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --onyx-green: #00FF00; --onyx-dark: #050505; }
        body { background: var(--onyx-dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }

        /* ÉCRAN DE CRÉATION DE COMPTE */
        #auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .auth-card { width: 80%; padding: 20px; border: 1px solid var(--onyx-green); border-radius: 15px; }
        input { background: #111; border: 1px solid #444; color: #fff; padding: 12px; margin: 10px 0; width: 90%; border-radius: 5px; }
        
        /* SPLASH ANIMATION */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1500;
        }
        .loader { width: 50px; height: 50px; border: 3px solid #111; border-top: 3px solid var(--onyx-green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* INTERFACE PRINCIPALE */
        header { padding: 15px; background: #111; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--onyx-green); }
        .user-badge { font-size: 10px; background: var(--onyx-green); color: #000; padding: 2px 8px; border-radius: 10px; font-weight: bold; }

        #scanner-container { width: 90%; height: 220px; margin: 20px auto; border: 2px solid var(--onyx-green); position: relative; border-radius: 15px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .lang-bar { display: flex; justify-content: center; gap: 10px; margin: 10px 0; }
        .lang-btn { background: none; border: 1px solid #444; color: #fff; padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; }
        .lang-btn.active { border-color: var(--onyx-green); color: var(--onyx-green); }

        .btn { background: #222; border: 1px solid var(--onyx-green); color: var(--onyx-green); padding: 10px 15px; border-radius: 5px; font-weight: bold; }
        #result-box { width: 85%; background: #111; margin: 15px auto; padding: 15px; border-radius: 10px; border-left: 4px solid var(--onyx-green); min-height: 60px; }
        .history-item { background: #1a1a1a; padding: 10px; margin: 5px 5%; border-radius: 5px; font-size: 13px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 id="tr-auth-title" style="color:var(--onyx-green)">ONYX IDENTITY</h2>
            <p id="tr-auth-sub" style="font-size: 12px; color: #888;">CRÉER VOTRE PROFIL ABIDJAN CORE</p>
            <input type="text" id="username" placeholder="Pseudo / Name">
            <input type="password" id="pin" placeholder="Code PIN (4 chiffres)">
            <button class="btn" onclick="createAccount()" style="width: 100%; margin-top: 10px;">ACCÉDER</button>
        </div>
    </div>

    <div id="splash">
        <div class="loader"></div>
        <p style="color:var(--onyx-green); margin-top: 20px; letter-spacing: 2px;">ONYX LOADING...</p>
    </div>

    <header>
        <div><span style="color:var(--onyx-green); font-weight:bold;">ONYX</span> <span id="user-display">SCAN</span></div>
        <div class="user-badge" id="tr-status">MEMBRE ACTIF</div>
    </header>

    <div class="lang-bar">
        <button class="lang-btn active" onclick="changeLang('fr')">FR</button>
        <button class="lang-btn" onclick="changeLang('en')">EN</button>
        <button class="lang-btn" onclick="changeLang('es')">ES</button>
    </div>

    <div id="scanner-container">
        <video id="video"></video>
    </div>

    <div style="text-align:center;">
        <button class="btn" onclick="toggleFlash()">🔦 FLASH</button>
    </div>

    <div id="result-box">
        <div id="tr-ready" style="color:var(--onyx-green); font-size: 12px;">● SYSTÈME PRÊT</div>
        <div id="product-name">...</div>
    </div>

    <div id="history-list"></div>

    <audio id="beep" src="https://www.soundjay.com/buttons/beep-07.mp3"></audio>

    <script>
        const codeReader = new ZXing.BrowserBarcodeReader();
        let videoTrack = null;
        let isFlashOn = false;
        let currentLang = 'fr';

        const texts = {
            fr: { authT: "IDENTITÉ ONYX", authS: "CRÉER VOTRE PROFIL", status: "MEMBRE ACTIF", ready: "● SYSTÈME PRÊT", wait: "RECHERCHE...", unknown: "Produit inconnu" },
            en: { authT: "ONYX IDENTITY", authS: "CREATE YOUR PROFILE", status: "ACTIVE MEMBER", ready: "● SYSTEM READY", wait: "SEARCHING...", unknown: "Unknown product" },
            es: { authT: "IDENTIDAD ONYX", authS: "CREAR TU PERFIL", status: "MIEMBRO ACTIVO", ready: "● SISTEMA LISTO", wait: "BUSCANDO...", unknown: "Producto desconocido" }
        };

        function changeLang(l) {
            currentLang = l;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            updateUI();
        }

        function updateUI() {
            const t = texts[currentLang];
            document.getElementById('tr-auth-title').innerText = t.authT;
            document.getElementById('tr-auth-sub').innerText = t.authS;
            document.getElementById('tr-status').innerText = t.status;
            document.getElementById('tr-ready').innerText = t.ready;
        }

        function createAccount() {
            const user = document.getElementById('username').value;
            if(!user) return alert("Nom requis !");
            localStorage.setItem('onyx_user', user);
            
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('splash').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('user-display').innerText = user.toUpperCase();
                startScanner();
            }, 2000);
        }

        async function startScanner() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('video').srcObject = stream;
            videoTrack = stream.getVideoTracks()[0];
            codeReader.decodeFromVideoDevice(null, 'video', (result) => {
                if (result) processScan(result.text);
            });
        }

        async function processScan(code) {
            document.getElementById('beep').play();
            document.getElementById('tr-ready').innerText = texts[currentLang].wait;
            const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
            const data = await res.json();
            const name = (data.status === 1) ? data.product.product_name : texts[currentLang].unknown;
            document.getElementById('product-name').innerText = name;
            addToHistory(name);
            setTimeout(() => document.getElementById('tr-ready').innerText = texts[currentLang].ready, 3000);
        }

        function addToHistory(n) {
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<b>${n}</b> <span style="float:right; font-size:10px;">${new Date().toLocaleTimeString()}</span>`;
            document.getElementById('history-list').prepend(item);
        }

        function toggleFlash() {
            if(videoTrack) {
                isFlashOn = !isFlashOn;
                videoTrack.applyConstraints({ advanced: [{ torch: isFlashOn }] });
            }
        }

        window.onload = () => {
            if(localStorage.getItem('onyx_user')) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('user-display').innerText = localStorage.getItem('onyx_user').toUpperCase();
                startScanner();
            }
        };
    </script>
</body>
    </html>
