<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONYX SCAN PRO - ABIDJAN CORE</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <style>
        :root { --onyx-green: #00FF00; --onyx-dark: #0a0a0a; }
        body { background: var(--onyx-dark); color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; overflow-x: hidden; }

        /* ANIMATION D'ENTRÉE (SPLASH SCREEN) */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            animation: fadeOut 1s forwards 2.5s;
        }
        .loader-logo { font-size: 30px; font-weight: bold; color: var(--onyx-green); animation: pulse 1.5s infinite; }
        @keyframes fadeOut { to { opacity: 0; pointer-events: none; } }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* HEADER */
        header { padding: 15px; background: #111; display: flex; justify-content: space-between; border-bottom: 2px solid var(--onyx-green); }
        .logo { color: var(--onyx-green); font-weight: bold; }

        /* SCANNER ZONE */
        #scanner-container { width: 90%; height: 250px; margin: 20px auto; border: 2px solid var(--onyx-green); position: relative; border-radius: 15px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .scan-line { position: absolute; top: 50%; width: 100%; height: 2px; background: red; box-shadow: 0 0 10px red; animation: move 2s infinite; }
        @keyframes move { 0%, 100% { top: 10%; } 50% { top: 90%; } }

        /* BOUTONS */
        .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .btn { background: #222; border: 1px solid var(--onyx-green); color: var(--onyx-green); padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .btn:active { background: var(--onyx-green); color: #000; }

        /* RÉSULTAT & HISTORIQUE */
        #result-box { width: 85%; background: #1a1a1a; margin: 0 auto 20px; padding: 15px; border-radius: 10px; border-left: 4px solid var(--onyx-green); }
        .history-section { width: 90%; margin: 0 auto; padding-bottom: 30px; }
        .history-item { background: #222; padding: 10px; margin-bottom: 5px; border-radius: 5px; font-size: 14px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="loader-logo">ONYX SCAN</div>
        <div style="color: #666; font-size: 12px; margin-top: 10px;">INITIALISATION ABIDJAN CORE...</div>
    </div>

    <header>
        <div class="logo">ONYX <span style="color:#fff">PRO</span></div>
        <div style="font-size: 12px; border: 1px solid #fff; padding: 2px 5px;">v2.0</div>
    </header>

    <div id="scanner-container">
        <video id="video"></video>
        <div class="scan-line"></div>
    </div>

    <div class="controls">
        <button class="btn" onclick="toggleFlash()">🔦 LAMPE</button>
        <button class="btn" onclick="clearHistory()">🗑️ VIDER</button>
    </div>

    <div id="result-box">
        <div id="status" style="color:var(--onyx-green)">● SYSTÈME PRÊT</div>
        <div id="product-name" style="font-size: 18px; margin-top: 5px;">En attente de scan...</div>
    </div>

    <div class="history-section">
        <h3 style="font-size: 14px; color: #666;">HISTORIQUE RÉCENT</h3>
        <div id="history-list"></div>
    </div>

    <audio id="beep" src="https://www.soundjay.com/buttons/beep-07.mp3"></audio>

    <script>
        const codeReader = new ZXing.BrowserBarcodeReader();
        let isLocked = false;
        let videoTrack = null;
        let isFlashOn = false;

        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('video').srcObject = stream;
                videoTrack = stream.getVideoTracks()[0];
                
                loadHistory();

                codeReader.decodeFromVideoDevice(null, 'video', (result) => {
                    if (result && !isLocked) {
                        isLocked = true;
                        processScan(result.text);
                    }
                });
            } catch (e) { alert("Erreur Caméra : Vérifiez les autorisations."); }
        }

        async function processScan(code) {
            document.getElementById('beep').play();
            document.getElementById('status').innerText = "⌛ RECHERCHE...";
            
            try {
                const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
                const data = await res.json();
                
                let name = "Produit inconnu";
                if (data.status === 1) {
                    name = data.product.product_name || "Sans nom";
                }

                document.getElementById('product-name').innerText = name;
                saveToHistory(name, code);
            } catch (err) {
                document.getElementById('product-name').innerText = "Erreur réseau";
            }

            document.getElementById('status').innerText = "● SYSTÈME PRÊT";
            setTimeout(() => { isLocked = false; }, 3000);
        }

        function toggleFlash() {
            if (!videoTrack) return;
            isFlashOn = !isFlashOn;
            const caps = videoTrack.getCapabilities();
            if (caps.torch) {
                videoTrack.applyConstraints({ advanced: [{ torch: isFlashOn }] });
            } else {
                alert("Flash non supporté sur cet appareil.");
            }
        }

        function saveToHistory(name, code) {
            let history = JSON.parse(localStorage.getItem('onyx_history') || "[]");
            history.unshift({ name, code, date: new Date().toLocaleTimeString() });
            history = history.slice(0, 5); // Garde les 5 derniers
            localStorage.setItem('onyx_history', JSON.stringify(history));
            renderHistory();
        }

        function loadHistory() { renderHistory(); }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const history = JSON.parse(localStorage.getItem('onyx_history') || "[]");
            list.innerHTML = history.map(item => `
                <div class="history-item">
                    <span>${item.name}</span>
                    <span style="color:#666; font-size:10px;">${item.date}</span>
                </div>
            `).join('');
        }

        function clearHistory() {
            localStorage.removeItem('onyx_history');
            renderHistory();
        }

        window.onload = startApp;
    </script>
</body>
    </html>
